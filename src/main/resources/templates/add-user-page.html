<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head(~{this :: title})">
    <title>Add New User</title>
</head>
<body>

    <header th:insert="layout :: header"></header>

    <div class="container text-start">
        <div th:replace="layout :: pageTitle('Add New User')"></div>
        <form class="form-narrow form-horizontal" th:action="@{/users/save}" th:object="${userDto}" method="post">

            <div class="form-group">
                <label class="col-lg-5 control-label">Username:</label>
                <div class="col-lg-7">
                    <input class="form-control" type="text" th:field="*{username}" placeholder="Enter username"
                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''" />
                    <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">
                        Username Error
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="col-lg-5 control-label">Email:</label>
                <div class="col-lg-7">
                    <input class="form-control" type="text" th:field="*{email}" placeholder="Enter email"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" />
                    <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                        Email Error
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="col-lg-5 control-label">Password</label>
                <div class="col-lg-7">
                    <input type="password" th:field="*{password}" placeholder="Enter password"
                           class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" />
                    <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                        Password Error
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="col-lg-5 control-label">Confirm Password</label>
                <div class="col-lg-7">
                    <input type="password" th:field="*{confirmPassword}" placeholder="Enter password again to confirm"
                           class="form-control" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''" />
                    <div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">
                        Confirm Password Error
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="col-lg-5 control-label">Role:</label>
                <div class="col-lg-7">
                    <select class="form-control" id="role" th:field="*{role.id}" required>
                        <option th:each="role : ${allRoles}"
                                th:value="${role.id}"
                                th:text="${role.name}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success mt-3">Save</button>
                <a th:href="@{/users}">
                    <button type="button" class="btn btn-default mt-3">Cancel</button>
                </a>
            </div>

        </form>
    </div>

    <footer th:replace="layout :: footer">Footer</footer>

</body>
</html>
