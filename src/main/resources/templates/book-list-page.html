<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head(~{this :: title})">
  <title>Book List</title>
</head>
<body>

  <header th:insert="layout :: header"></header>

  <div class="container">
    <div th:replace="layout :: pageTitle('All Books in one place!')"></div>

    <div th:insert="layout :: content(~{ :: #book-list})">
      <div id="book-list">
        <a th:if="${isAdmin}" th:href="@{/books/add}">
          <button type="button" class="btn btn-info" style="margin-bottom: 10px;">Create New</button>
        </a>

        <div th:if="${error}" class="alert alert-danger" role="alert">
          <span th:text="${error}">Error message here</span>
          <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>

        <table id="myDataTable" class="display">
          <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Category</th>
            <th>Published Year</th>
            <th>Actions</th>
          </tr>
          </thead>
          <tbody>

          </tbody>
        </table>

      </div>
    </div>
  </div>

  <footer th:replace="layout :: footer">Footer</footer>
</body>

<script th:inline="javascript">
  const isAdmin = /*[[${isAdmin}]]*/ false;
  $(document).ready(function() {
    $('#myDataTable').DataTable({
      serverSide: true,
      processing: true,
      searching: true,
      ordering: true,
      order: [ [0, 'desc'] ],
      ajax: {
        url: "/api/books",
        type: "GET"
      },
      columns: [
        { data: "id" },
        { data: "title" },
        { data: "author.name" },
        { data: "category.name", defaultContent: "" },
        { data: "publishedYear" },
        {
          visible: isAdmin,
          data: null,
          orderable: false,
          searchable: false,
          render: function (data, type, row) {
            if (!isAdmin) return '';
            return renderActions('book', row.id);
          }
        }
      ]
    });
  });
</script>

<div th:replace="~{layout :: action}"></div>
</html>
