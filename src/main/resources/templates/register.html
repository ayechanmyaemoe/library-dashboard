<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head(~{this :: title})">
    <title>Register Page</title>
</head>
<body>
<header th:insert="layout :: header"></header>

<div class="container">
    <div th:replace="layout :: pageTitle('Register')"></div>

    <form class="form-narrow form-horizontal" th:action="@{/users/register}" th:object="${userDto}" method="post">

        <div th:if="${param.success}" class="alert alert-success">
            <span>You have successfully created account!</span>
            <a th:href="@{/register}" class="close" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </a>
        </div>

        <div th:if="${error}" class="alert alert-danger" role="alert">
            <span th:text="${error}">Error message here</span>
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>

        <div class="form-group">
            <label class="col-lg-5 control-label">Username</label>
            <div class="col-lg-7">
                <input type="text" th:field="*{username}" placeholder="Enter username"
                       class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''" />
                <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">
                    Username Error
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-lg-5 control-label">Email</label>
            <div class="col-lg-7">
                <input type="text" th:field="*{email}" placeholder="Enter email address"
                       class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" />
                <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                    Email Error
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-lg-5 control-label">Password</label>
            <div class="col-lg-7">
                <input type="password" th:field="*{password}" placeholder="Enter password"
                       class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" />
                <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                    Password Error
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-lg-5 control-label">Confirm Password</label>
            <div class="col-lg-7">
                <input type="password" th:field="*{confirmPassword}" placeholder="Enter password again to confirm"
                       class="form-control" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''" />
                <div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">
                    Confirm Password Error
                </div>
            </div>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-success mt-3">Register</button>
        </div>
    </form>
</div>

</body>
</html>
