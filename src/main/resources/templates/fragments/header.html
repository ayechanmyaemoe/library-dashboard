<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/3.0.0/css/bootstrap.min.css}">
    <link th:href="@{/css/core.css}" rel="stylesheet" />
</head>
<body>
    <nav class="navbar navbar-inverse navbar-fixed-top" th:fragment="header">
        <div class="container">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".nav-collapse">
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <span class="navbar-brand">SIP Library</span>
            </div>
            <div class="navbar-collapse collapse" th:if="${module != 'login' && module != 'register'}">
                <ul class="nav navbar-nav">
                    <li th:classappend="${module == 'home' ? 'active' : ''}">
                        <a href="#" th:href="@{/}">Home</a>
                    </li>
                    <li th:classappend="${module == 'books' ? 'active' : ''}">
                        <a href="#" th:href="@{/books}">Books</a>
                    </li>
                    <li th:classappend="${module == 'authors' ? 'active' : ''}">
                        <a href="#" th:href="@{/authors}">Authors</a>
                    </li>
                    <li th:classappend="${module == 'users' ? 'active' : ''}">
                        <a href="#" th:href="@{/users}">Users</a>
                    </li>
                </ul>

                <ul class="nav navbar-nav navbar-right">
                    <li th:if="${username}" th:text="${username}">
                        <span>Username</span>
                    </li>
                    <li>
                        <form th:action="@{/logout}" method="post" style="padding: 10px 15px;">
                            <button type="submit" class="btn btn-link navbar-btn"
                                    style="text-decoration: none; color: #9d9d9d; padding: 0;">
                                <span class="glyphicon glyphicon-log-out"></span> Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>

            <div class="navbar-collapse collapse" th:if="${module == 'login'}">
                <ul class="nav navbar-nav navbar-right">
                    <li>
                        <a href="#" th:href="@{/users/register}">Register</a>
                    </li>
                </ul>
            </div>

            <div class="navbar-collapse collapse" th:if="${module == 'register'}">
                <ul class="nav navbar-nav navbar-right">
                    <li>
                        <a href="#" th:href="@{/login}">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</body>
</html>
