<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head(~{this :: title})">
    <title>Login Page</title>
</head>
<body>
<header th:insert="layout :: header"></header>

<div class="container">
    <div th:replace="layout :: pageTitle('Login')"></div>

    <form class="form-narrow form-horizontal" th:action="@{/login}" method="post">

        <div th:if="${param.logout}" class="alert alert-danger">
            <span>You have been logged out!</span>
            <a th:href="@{/login}" class="close" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </a>
        </div>

        <div th:if="${param.error != null}" class="alert alert-danger" role="alert">
            <span th:text="${param.error}">Error Message</span>
            <a th:href="@{/login}" class="close" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </a>
        </div>

        <div class="form-group">
            <label class="col-lg-4 control-label">Username:</label>
            <div class="col-lg-8">
                <input type="text" placeholder="Enter username" name="username" class="form-control" />
            </div>
        </div>
        <div class="form-group">
            <label class="col-lg-4 control-label">Password:</label>
            <div class="col-lg-8">
                <input type="password" placeholder="Enter password" name="password" class="form-control" />
            </div>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-primary mt-3">Login</button>
        </div>
    </form>
</div>

</body>
</html>
