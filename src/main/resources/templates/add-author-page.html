<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head(~{this :: title})">
    <title>Add New Author</title>
</head>
<body>

    <header th:insert="layout :: header"></header>

    <div class="container text-start">
        <div th:replace="layout :: pageTitle('Add New Author')"></div>
        <form class="form-narrow form-horizontal" th:action="@{/authors/save}" th:object="${authorDto}" method="post">

            <div class="form-group">
                <label class="col-lg-3 control-label">Name:</label>
                <div class="col-lg-9">
                    <input class="form-control" type="text" th:field="*{name}" placeholder="Enter author name"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''" />
                    <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                        Name Error
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="col-lg-3 control-label">Birth Date:</label>
                <div class="col-lg-9">
                    <input class="form-control" type="text" id="birthDatePicker" th:field="*{birthDate}"
                           placeholder="Click to insert"
                           th:classappend="${#fields.hasErrors('birthDate')} ? 'is-invalid' : ''" />
                    <div class="text-danger" th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}">
                        BirthYear Error
                    </div>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success mt-3">Save</button>
                <a th:href="@{/authors}">
                    <button type="button" class="btn btn-default mt-3">Cancel</button>
                </a>
            </div>

        </form>
    </div>

    <footer th:replace="layout :: footer">Footer</footer>

</body>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        flatpickr("#birthDatePicker", {
            dateFormat: "d/m/Y",
            allowInput: false,
            altInput: true,
            altFormat: "d/m/Y",
            maxDate: new Date().fp_incr(-1)
        });
    });
</script>
</html>
