<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head(~{this :: title})">
    <title>Edit Category</title>
</head>
<body>

<header th:insert="layout :: header"></header>

<div class="container text-start">
    <div th:replace="layout :: pageTitle('Edit Category')"></div>
    <form class="form-narrow form-horizontal" th:action="@{/categories/save}" th:object="${categoryDto}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label class="col-lg-4 control-label">Name:</label>
            <div class="col-lg-8">
                <input class="form-control" type="text" th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"/>
                <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                    Name Error
                </div>
            </div>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-success mt-3">Save</button>
            <a th:href="@{/categories}">
                <button type="button" class="btn btn-default mt-3">Cancel</button>
            </a>
        </div>
    </form>
</div>

<footer th:replace="layout :: footer">Footer</footer>
</body>
</html>
