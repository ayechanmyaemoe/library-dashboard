<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <th:block th:replace="${title}"></th:block>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

  <script th:src="@{/webjars/jquery/1.11.1/jquery.min.js}"></script>
  <script th:src="@{/webjars/momentjs/2.30.1-1/moment.min.js}"></script>

  <link rel="stylesheet" th:href="@{/webjars/datatables/2.3.7/css/dataTables.dataTables.css}" />
  <script th:src="@{/webjars/datatables/2.3.7/js/dataTables.js}"></script>

  <script th:src="@{/webjars/bootstrap/3.0.0/js/bootstrap.min.js}"></script>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/3.0.0/css/bootstrap.min.css}">
  <link th:href="@{/css/core.css}" rel="stylesheet" />
</head>
<body>

<!--/* Header fragment */-->
<div th:fragment="header">
  <nav class="navbar navbar-inverse navbar-fixed-top" th:replace="fragments/header :: header">
    <div class="container">
      <div class="navbar-header">
        <a class="navbar-brand" href="#">Static header</a>
      </div>
      <div class="navbar-collapse collapse">
        <ul class="nav navbar-nav">
          <li class="active"><a href="#">Home</a></li>
        </ul>
      </div>
    </div>
  </nav>
</div>

<div th:fragment="pageTitle(h1Title)">
  <h1 class="text-center " th:text="${h1Title}">Page Title</h1>
</div>

<div class="container" th:fragment="content(value)" th:insert="${value}">
  <h1>Static content for prototyping purposes only</h1>
</div>

<!--/* Footer fragment */-->
<footer th:fragment="footer" th:replace="fragments/footer :: footer">&copy; 2026 Default Footer</footer>

</body>

<script th:fragment="action" th:inline="javascript">
  function renderActions(type, rowId) {
    let baseUrl;
    switch (type) {
      case 'book': baseUrl = '/books'; break;
      case 'author': baseUrl = '/authors'; break;
      default: baseUrl = '/users';
    }

    const changePasswordBtn = (type === 'user')
            ? `<a href="${baseUrl}/${rowId}/change-password" class="btn btn-warning btn-sm">Change Password</a>`
            : '';

    return `
        <a href="${baseUrl}/${rowId}/edit" class="btn btn-primary btn-sm">Edit</a>
        <form action="${baseUrl}/${rowId}" method="post" style="display:inline;">
            <input type="hidden" name="_method" value="DELETE">
            <button type="submit" class="btn btn-danger btn-sm"
                    onclick="return confirm('Are you sure to delete this ${type}?')">Delete</button>
        </form>
        ${changePasswordBtn}
    `;
  }
</script>
</html>
