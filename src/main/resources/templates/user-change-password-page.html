<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head(~{this :: title})">
    <title>Register Page</title>
</head>
<body>
<header th:insert="layout :: header"></header>

<div class="container">
    <div th:replace="layout :: pageTitle('Change Password')"></div>

    <form class="form-narrow form-horizontal" th:action="@{/users/save-password}" th:object="${userDto}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div th:if="${error}" class="alert alert-danger" role="alert">
            <span th:text="${error}">Error message here</span>
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>

        <div class="form-group">
            <label class="col-lg-5 control-label">Old Password</label>
            <div class="col-lg-7">
                <input type="password" th:field="*{oldPassword}" placeholder="Enter old password"
                       class="form-control" th:classappend="${#fields.hasErrors('oldPassword')} ? 'is-invalid' : ''" />
                <div class="text-danger" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}">
                    Old Password Error
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="col-lg-5 control-label">New Password</label>
            <div class="col-lg-7">
                <input type="password" th:field="*{newPassword}" placeholder="Enter new password"
                       class="form-control" th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid' : ''" />
                <div class="text-danger" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}">
                    New Password Error
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="col-lg-5 control-label">Confirm Password</label>
            <div class="col-lg-7">
                <input type="password" th:field="*{confirmPassword}" placeholder="Enter new password again"
                       class="form-control" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''" />
                <div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">
                    Confirm Password Error
                </div>
            </div>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-success mt-3">Confirm</button>
            <a th:href="@{/users}">
                <button type="button" class="btn btn-default mt-3">Cancel</button>
            </a>
        </div>
    </form>
</div>

</body>
</html>
