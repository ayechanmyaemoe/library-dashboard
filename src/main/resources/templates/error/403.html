<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head(~{this :: title})">
    <title>Access Denied</title>
</head>
<body>
<header th:insert="layout :: header"></header>

<div class="container text-center" style="margin-top: 100px;">
    <h1 class="text-danger">
        <span class="glyphicon glyphicon-lock"></span> 403 - Access Denied
    </h1>
    <p class="lead">
        Sorry,
        you do not have permission to access this route.
    </p>
    <hr>
    <a th:href="@{/}" class="btn btn-primary" style="margin-bottom: 3px;">Return to Home</a>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-link text-muted">Login as different user</button>
    </form>
</div>
</body>
</html>
