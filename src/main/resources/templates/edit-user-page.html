<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head(~{this :: title})">
    <title>Edit User</title>
</head>
<body>

    <header th:insert="layout :: header"></header>

    <div class="container text-start">
        <div th:replace="layout :: pageTitle('Edit User')"></div>
        <form class="form-narrow form-horizontal" th:action="@{/users/update}" th:object="${userDto}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label class="col-lg-4 control-label">Username:</label>
                <div class="col-lg-8">
                    <input class="form-control" type="text" th:field="*{username}"
                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''" />
                    <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">
                        Username Error
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="col-lg-4 control-label">Email:</label>
                <div class="col-lg-8">
                    <input class="form-control" type="text" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" />
                    <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                        Email Error
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="col-lg-4 control-label">Role:</label>
                <div class="col-lg-8">
                    <select class="form-control" th:field="*{role}" required>
                        <option th:each="role : ${allRoles}"
                                th:value="${role.id}"
                                th:text="${role.name}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success mt-3">Save</button>
                <a th:href="@{/users}">
                    <button type="button" class="btn btn-default mt-3">Cancel</button>
                </a>
            </div>

        </form>
    </div>

    <footer th:replace="layout :: footer">Footer</footer>
</body>
</html>
