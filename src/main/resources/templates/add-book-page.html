<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head(~{this :: title})">
    <title>Add New Book</title>
</head>
<body>

    <header th:insert="layout :: header"></header>

    <div class="container text-start">
        <div th:replace="layout :: pageTitle('Add New Book')"></div>
        <form class="form-narrow form-horizontal" th:action="@{/books/save}" th:object="${book}" method="post">

            <div class="form-group">
                <label class="col-lg-4 control-label">Title:</label>
                <div class="col-lg-8">
                    <input class="form-control" type="text" th:field="*{title}" placeholder="Enter book title"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''" />
                    <div class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">
                        Title Error
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="col-lg-4 control-label">Published Year:</label>
                <div class="col-lg-8">
                    <input class="form-control" type="text" th:field="*{publishedYear}" placeholder="Enter published year"
                           th:classappend="${#fields.hasErrors('publishedYear')} ? 'is-invalid' : ''" />
                    <div class="text-danger" th:if="${#fields.hasErrors('publishedYear')}" th:errors="*{publishedYear}">
                        Published Year Error
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="col-lg-4 control-label">Author:</label>
                <div class="col-lg-8">
                    <select class="form-control" th:field="*{author}" required>
                        <option th:each="a : ${allAuthors}"
                                th:value="${a.id}"
                                th:text="${a.name}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="col-lg-4 control-label">Category:</label>
                <div class="col-lg-8">
                    <select class="form-control" th:field="*{category}" required>
                        <option th:each="cat : ${allCategories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success mt-3">Save</button>
                <a th:href="@{/books}">
                    <button type="button" class="btn btn-default mt-3">Cancel</button>
                </a>
            </div>
        </form>
    </div>

    <footer th:replace="layout :: footer">Footer</footer>

</body>
</html>
